<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRAWORLD | Aesthetic Archive</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

:root {
    --glass: rgba(255, 255, 255, 0.9);
    --accent: #ff4757;
    --overlay: rgba(0, 0, 0, 0.4);
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    /* High-quality background */
    background: linear-gradient(var(--overlay), var(--overlay)), 
                url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?auto=format&fit=crop&q=80&w=2000');
    background-size: cover;
    background-attachment: fixed;
    background-position: center;
    color: #222;
    min-height: 100vh;
}

.page {
    display: none;
    padding: 40px 20px 140px;
    max-width: 800px;
    margin: auto;
    animation: fadeIn 0.6s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

.active { display: block; }

h1 {
    text-align: center;
    color: white;
    text-shadow: 0 4px 12px rgba(0,0,0,0.4);
    font-size: 2.8rem;
    letter-spacing: -1px;
    margin-bottom: 30px;
}

/* Floating Navigation */
nav {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 450px;
    background: var(--glass);
    backdrop-filter: blur(15px);
    display: flex;
    justify-content: space-around;
    padding: 12px;
    border-radius: 40px;
    border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    z-index: 1000;
}

nav button {
    background: none;
    border: none;
    font-weight: 600;
    cursor: pointer;
    color: #444;
    font-size: 0.75rem;
    text-transform: uppercase;
    transition: 0.3s;
}

nav button:hover { color: var(--accent); }

.card {
    background: var(--glass);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.5);
}

input {
    width: 100%;
    padding: 14px;
    margin: 10px 0 20px;
    border: 1px solid #ddd;
    border-radius: 12px;
    box-sizing: border-box;
    font-size: 1rem;
}

.btn {
    background: #1a1a1a;
    color: white;
    border: none;
    padding: 16px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
    width: 100%;
    text-transform: uppercase;
}

.btn:hover { background: var(--accent); transform: scale(1.02); }

/* Vibe Grid */
.vibe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
}

.vibe-box {
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 20px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    background-size: cover;
    background-position: center;
    transition: 0.4s;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
}

.vibe-box:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

/* Dynamic Blog Items */
.blog-item {
    background: var(--glass);
    border-radius: 24px;
    overflow: hidden;
    margin-bottom: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.blog-img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    background: #eee;
}

.blog-content { padding: 25px; }

.route-img {
    width: 100%;
    height: 200px;
    border-radius: 18px;
    object-fit: cover;
    margin-bottom: 20px;
    display: none;
    background: #eee;
}
</style>
</head>

<body>

<nav>
    <button onclick="showPage('page1')">Identify</button>
    <button onclick="showPage('page2')">Vibe</button>
    <button onclick="showPage('page3')">Explore</button>
    <button onclick="showPage('page4')">Navigate</button>
</nav>

<div id="page1" class="page active">
    <h1>TRAWORLD</h1>
    <div class="card">
        <input type="text" id="p1-name" placeholder="Your Name">
        <input type="email" id="p1-email" placeholder="Email Address">
        <button class="btn" onclick="saveGo()">Enter Archive</button>
    </div>
</div>

<div id="page2" class="page">
    <h1>THE ESSENCE</h1>
    <div class="vibe-grid">
        <div class="vibe-box" onclick="loadBlogs('Aura')" style="background-image: linear-gradient(var(--overlay), var(--overlay)), url('https://images.unsplash.com/photo-1524492412937-b28074a5d7da?auto=format&fit=crop&w=400')">Golden Aura</div>
        <div class="vibe-box" onclick="loadBlogs('Ether')" style="background-image: linear-gradient(var(--overlay), var(--overlay)), url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=400')">Ethereal Blue</div>
        <div class="vibe-box" onclick="loadBlogs('Primal')" style="background-image: linear-gradient(var(--overlay), var(--overlay)), url('https://images.unsplash.com/photo-1533105079780-92b9be482077?auto=format&fit=crop&w=400')">Primal Roots</div>
        <div class="vibe-box" onclick="loadBlogs('Vivid')" style="background-image: linear-gradient(var(--overlay), var(--overlay)), url('https://images.unsplash.com/photo-1493246507139-91e8bef99c02?auto=format&fit=crop&w=400')">Vivid Dreams</div>
    </div>
</div>

<div id="page3" class="page">
    <div id="blogList"></div>
</div>

<div id="page4" class="page">
    <h1>NAVIGATE</h1>
    <div class="card">
        <img id="dest-preview" class="route-img" src="" alt="Destination">
        <input type="text" id="startP" placeholder="Starting Point (e.g. London)">
        <input type="text" id="endP" placeholder="Destination (e.g. Kyoto)">
        <button class="btn" onclick="generateRoute()">Generate Route</button>
        
        <div id="route-box" style="display:none; margin-top:20px; text-align:center;">
            <p id="route-details"></p>
            <a id="maps-link" href="#" target="_blank" class="btn" style="text-decoration:none; display:block;">Open in Maps</a>
        </div>
    </div>
</div>

<script>
// Improved DB with specific Image URLs for reliability
const travelDB = [
    { name: "Kyoto, Japan", vibe: "Ether", weather: "🌸 Cherry Blossom", food: "Matcha & Ramen", img: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800" },
    { name: "Zermatt, Switzerland", vibe: "Ether", weather: "❄️ Snowy", food: "Cheese Fondue", img: "https://images.unsplash.com/photo-1527668752968-14dc70a27c95?auto=format&fit=crop&w=800" },
    { name: "Jaipur, India", vibe: "Aura", weather: "🏜️ Dry", food: "Dal Baati Churma", img: "https://images.unsplash.com/photo-1599661046289-e31897846e41?auto=format&fit=crop&w=800" },
    { name: "Bali, Indonesia", vibe: "Primal", weather: "🌴 Tropical", food: "Nasi Goreng", img: "https://images.unsplash.com/photo-1537996194471-e657df975ab4?auto=format&fit=crop&w=800" },
    { name: "Paris, France", vibe: "Vivid", weather: "🥖 Romantic", food: "Croissants", img: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=800" },
    { name: "Iceland", vibe: "Ether", weather: "🌌 Auroras", food: "Skyr", img: "https://images.unsplash.com/photo-1476610182048-b716b8518aae?auto=format&fit=crop&w=800" }
];

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
}

function saveGo() {
    if(document.getElementById('p1-name').value) showPage('page2');
    else alert("Please identify yourself.");
}

function loadBlogs(vibe) {
    const list = document.getElementById('blogList');
    list.innerHTML = `<h1>${vibe} Archive</h1>`;

    travelDB.filter(p => p.vibe === vibe).forEach(p => {
        list.innerHTML += `
            <div class="blog-item">
                <img class="blog-img" src="${p.img}" alt="${p.name}">
                <div class="blog-content">
                    <h3>${p.name}</h3>
                    <p><b>Atmosphere:</b> ${p.weather}</p>
                    <p><b>Local Flavor:</b> ${p.food}</p>
                    <button class="btn" onclick="setDest('${p.name}', '${p.img}')">Explore Path →</button>
                </div>
            </div>`;
    });
    showPage('page3');
}

function setDest(name, imgUrl) {
    document.getElementById('endP').value = name;
    const preview = document.getElementById('dest-preview');
    preview.src = imgUrl; // Uses the same high-quality image from the blog
    preview.style.display = "block";
    showPage('page4');
}

function generateRoute() {
    const start = document.getElementById('startP').value;
    const end = document.getElementById('endP').value;
    if (!start || !end) return alert("Coords missing.");

    // Google Maps URL Fix
    const url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(start)}&destination=${encodeURIComponent(end)}&travelmode=driving`;
    
    document.getElementById('route-details').innerHTML = `<b>Course Set:</b> ${start} to ${end}`;
    document.getElementById('maps-link').href = url;
    document.getElementById('route-box').style.display = "block";
}
</script>

</body>
</html>
